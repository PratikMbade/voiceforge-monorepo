version: "3.9"

# Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  backend:
    image: ${REGISTRY}/voiceforge-backend:${IMAGE_TAG:-latest}
    environment:
      - ENV=production
      - DEBUG=false
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  worker-synthesis:
    image: ${REGISTRY}/voiceforge-worker:${IMAGE_TAG:-latest}
    environment:
      - ENV=production
      - DEBUG=false
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  worker-cloning:
    image: ${REGISTRY}/voiceforge-worker:${IMAGE_TAG:-latest}
    environment:
      - ENV=production
      - DEBUG=false
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  frontend:
    image: ${REGISTRY}/voiceforge-frontend:${IMAGE_TAG:-latest}
    environment:
      - VITE_API_BASE_URL=${API_BASE_URL}

  postgres:
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
